server:
  port: ${SERVER_PORT:8083}
  forward-headers-strategy: framework

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: transaction-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/digibnk_transaction}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/digibnk}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: ${JPA_SHOW_SQL:true}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true

feign:
  circuitbreaker:
    enabled: true   # enables FallbackFactory on all @FeignClient beans
  client:
    config:
      account-service:
        loggerLevel: BASIC
        connectTimeout: ${FEIGN_CONNECT_TIMEOUT:3000}
        readTimeout: ${FEIGN_READ_TIMEOUT:3000}

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      account-service:
        # Evaluate last 10 calls (COUNT_BASED sliding window)
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        # At least 5 calls must complete before evaluating failure rate
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        # Also open circuit if >= 50% of calls are slow (> slowCallDurationThreshold)
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s
        # Stay OPEN for 30s before trying again (HALF-OPEN)
        wait-duration-in-open-state: 30s
        # Allow 3 test calls in HALF-OPEN before deciding to CLOSE or re-OPEN
        permitted-number-of-calls-in-half-open-state: 3
        # Exceptions that count as failures
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException

  retry:
    instances:
      account-service:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - feign.FeignException.BadRequest
          - feign.FeignException.NotFound

  timelimiter:
    instances:
      account-service:
        timeout-duration: 3s
        cancel-running-future: true

# Observability
management:
  health:
    circuitbreakers:
      enabled: true
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers

app:
  swagger:
    server-url: ${API_SERVER_URL:http://localhost:8083}
  kafka:
    topics:
      transaction-created: ${KAFKA_TOPIC_TRANSACTION_CREATED:digibnk.transaction.created}

logging:
  level:
    com.digibnk.transaction.client: DEBUG
    io.github.resilience4j: DEBUG
    org.springframework.kafka: INFO
